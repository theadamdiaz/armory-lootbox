<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Armory — Loot Box Opener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{min-height:100vh;background:#06040e;margin:0;padding:0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06040e;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
#wrap{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;background:#06040e;min-height:100vh;font-family:'Nunito',sans-serif;width:100%;max-width:560px}
#tier-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:1.2rem}
.tbtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;padding:7px 14px;border-radius:4px;border:1.5px solid;cursor:pointer;background:transparent;transition:all 0.2s}
.tbtn:hover{transform:translateY(-1px)}
#c{display:block;cursor:pointer;border-radius:8px}
#tier-label{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;margin-top:0.8rem;text-align:center}
#hint{font-size:11px;color:#5030a0;margin-top:4px;font-style:italic;font-family:'Cinzel',serif;letter-spacing:1px;text-align:center}
#open-btn{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;padding:10px 28px;border-radius:4px;cursor:pointer;border:1.5px solid;transition:all 0.2s;margin-top:1rem;background:transparent;display:block}
#open-btn:hover{transform:translateY(-1px)}
#dm-toggle{position:fixed;bottom:14px;right:16px;font-size:10px;color:#2a1840;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;user-select:none;z-index:50;opacity:0.4;transition:opacity 0.2s}
#dm-toggle:hover{opacity:1}
#auth-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:rgba(2,0,8,0.88);opacity:0;pointer-events:none;transition:opacity 0.25s}
#auth-modal.visible{opacity:1;pointer-events:all}
#auth-box{background:#0c0820;border:1px solid #4a1890;border-radius:10px;padding:2rem 2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:300px;width:90%;box-shadow:0 0 50px rgba(80,20,180,0.3)}
#auth-identity{font-family:'Cinzel',serif;font-size:15px;letter-spacing:2px;color:#e0c8ff;text-align:center;padding:8px 20px;border:1px solid #5a20a0;border-radius:6px;background:rgba(80,20,160,0.15);width:100%}
#auth-label{font-size:11px;color:#6040a0;letter-spacing:1px;font-family:'Cinzel',serif;text-align:center}
#auth-input{font-family:'Cinzel',serif;font-size:20px;letter-spacing:6px;text-align:center;width:140px;padding:10px 14px;background:#06000e;border:1.5px solid #4a1890;border-radius:6px;color:#e0d0ff;outline:none;transition:border-color 0.2s}
#auth-input:focus{border-color:#8040e0}
#auth-input::placeholder{color:#2a1050;letter-spacing:3px}
#auth-error{font-size:11px;color:#ff6060;min-height:16px;text-align:center;font-style:italic}
.auth-btns{display:flex;gap:10px}
#auth-submit{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;padding:9px 22px;border-radius:4px;cursor:pointer;border:1.5px solid #8040e0;color:#ffffff;background:transparent;transition:all 0.2s}
#auth-submit:hover{background:rgba(120,50,200,0.2);transform:translateY(-1px)}
#auth-cancel{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:9px 16px;border-radius:4px;cursor:pointer;border:1.5px solid #3a1860;color:#c0a0e8;background:transparent;transition:all 0.2s}
#auth-cancel:hover{background:rgba(60,20,100,0.2)}
#dm-panel{width:100%;max-width:460px;margin-top:1rem;background:rgba(60,10,120,0.12);border:1px solid #3a1060;border-radius:8px;padding:1rem 1.2rem;display:none}
#dm-panel.visible{display:block}
#dm-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:#6030a0;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center}
#dm-close{font-size:11px;color:#4a2080;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px}
#dm-close:hover{color:#9060ff}
#dm-item-display{min-height:36px;display:flex;align-items:center;gap:10px;margin-bottom:0.8rem}
#dm-item-name{font-size:13px;color:#c090ff;font-weight:700;flex:1}
#dm-clear-btn{font-size:10px;color:#ff6060;cursor:pointer;border:0.5px solid rgba(255,80,80,0.3);border-radius:4px;padding:3px 8px;font-family:'Cinzel',serif;letter-spacing:1px;display:none}
#dm-clear-btn:hover{background:rgba(255,80,80,0.1)}
.dm-row{display:flex;gap:8px;margin-bottom:0.6rem}
#dm-select{flex:1;font-family:'Nunito',sans-serif;font-size:12px;padding:7px 10px;background:#0a0018;border:1px solid #3a1060;border-radius:4px;color:#c090ff;outline:none}
#dm-select option{background:#0a0018;color:#c090ff}
#dm-custom-input{flex:1;font-family:'Nunito',sans-serif;font-size:12px;padding:7px 10px;background:#0a0018;border:1px solid #3a1060;border-radius:4px;color:#c090ff;outline:none;display:none}
#dm-custom-input::placeholder{color:#3a1060}
#dm-type-select{font-family:'Nunito',sans-serif;font-size:12px;padding:7px 10px;background:#0a0018;border:1px solid #3a1060;border-radius:4px;color:#9060c0;outline:none;display:none;width:130px}
#dm-type-select option{background:#0a0018}
#dm-add-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;padding:7px 16px;border-radius:4px;cursor:pointer;border:1px solid #6030a0;color:#c090ff;background:transparent;transition:all 0.2s;white-space:nowrap}
#dm-add-btn:hover{background:rgba(120,40,200,0.2)}
#dm-status{font-size:11px;color:#4a2080;text-align:center;font-style:italic;min-height:16px}
#dm-refresh-btn{font-size:10px;color:#6040a0;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;padding:3px 8px;border:0.5px solid #3a1060;border-radius:4px}
#dm-refresh-btn:hover{color:#9060ff;border-color:#6030a0}
#items-area{width:100%;max-width:460px;margin-top:1.2rem}
#result-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-align:center;margin-bottom:0.8rem;opacity:0;transition:opacity 0.5s}
#result-title.show{opacity:1}
#items-list{list-style:none;display:flex;flex-direction:column;gap:8px}
#items-list li{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;opacity:0;transform:translateY(12px);transition:opacity 0.4s ease,transform 0.4s ease;color:#e0d8f0}
#items-list li.show{opacity:1;transform:translateY(0)}
#gold-row{display:flex;align-items:center;gap:10px;border-radius:8px;padding:11px 14px;opacity:0;transform:translateY(12px);transition:opacity 0.4s ease,transform 0.4s ease;border:1px solid #c8960a;background:linear-gradient(105deg,rgba(245,200,66,0.13) 0%,rgba(255,220,80,0.07) 60%,rgba(245,160,20,0.13) 100%);margin-bottom:8px;position:relative;overflow:hidden}
#gold-row::before{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,240,120,0.18),transparent);animation:shimmer 2.4s ease-in-out infinite;pointer-events:none}
@keyframes shimmer{0%{left:-60%}100%{left:130%}}
#gold-row.show{opacity:1;transform:translateY(0)}
.gold-amount{font-family:'Cinzel',serif;font-size:15px;font-weight:700;background:linear-gradient(90deg,#f5c842,#ffe080,#f5a020,#ffe080,#f5c842);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gshine 2.5s linear infinite;letter-spacing:1px}
@keyframes gshine{0%{background-position:0% center}100%{background-position:200% center}}
.gold-per{font-size:11px;color:#a07820;margin-top:2px;font-style:italic}
.gold-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:rgba(245,200,66,0.18);color:#c8960a;border:0.5px solid rgba(245,200,66,0.4);white-space:nowrap}
.item-left{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:700;line-height:1.3}
.item-notes{font-size:11px;color:#9080b0;line-height:1.3}
.item-rarity{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:4px;white-space:nowrap;align-self:center}
.r-Consumable{background:rgba(58,170,95,0.15);color:#4acc80;border:0.5px solid rgba(58,170,95,0.35)}
.r-Basic{background:rgba(74,126,245,0.15);color:#6090ff;border:0.5px solid rgba(74,126,245,0.35)}
.r-Trade{background:rgba(245,200,66,0.15);color:#f5c842;border:0.5px solid rgba(245,200,66,0.35)}
.r-Permanent{background:rgba(155,89,245,0.15);color:#b070ff;border:0.5px solid rgba(155,89,245,0.35)}
.r-Special{background:linear-gradient(90deg,rgba(255,78,205,0.15),rgba(160,32,240,0.15));color:#e060ff;border:0.5px solid rgba(192,80,240,0.35)}
.r-Custom{background:rgba(255,180,0,0.15);color:#ffb800;border:0.5px solid rgba(255,180,0,0.35)}
#done-btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;padding:9px 24px;border-radius:4px;cursor:pointer;border:1.5px solid #302060;transition:all 0.2s;margin-top:1rem;background:transparent;color:#6040a0;opacity:0;display:none}
#done-btn.show{opacity:1;display:block}
#done-btn:hover{background:rgba(255,255,255,0.05)}
</style>
</head>
<body>

<div id="auth-modal">
  <div id="auth-box">
    <div id="auth-identity"></div>
    <div id="auth-label">ENTER ACCESS CODE</div>
    <input id="auth-input" type="password" maxlength="5" placeholder="• • • • •" autocomplete="off"/>
    <div id="auth-error"></div>
    <div class="auth-btns">
      <button id="auth-cancel" onclick="closeAuth()">CANCEL</button>
      <button id="auth-submit" onclick="submitAuth()">ENTER ↗</button>
    </div>
  </div>
</div>

<div id="dm-toggle" onclick="openAuth()">⬡ DM</div>

<div id="wrap">
  <div id="tier-btns"></div>
  <canvas id="c" width="420" height="300"></canvas>
  <div id="tier-label" style="color:#d08040">BRONZE CHEST</div>
  <div id="hint">click chest or button to open</div>
  <button id="open-btn" onclick="startOpen()">OPEN CHEST</button>

  <div id="dm-panel">
    <div id="dm-panel-title">
      <span>⬡ DM MODE</span>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="dm-refresh-btn" onclick="refreshDmQueue()">↻ REFRESH</span>
        <span id="dm-close" onclick="closeDmPanel()">CLOSE ✕</span>
      </div>
    </div>
    <div id="dm-item-display">
      <span id="dm-item-name" style="color:#4a2080;font-style:italic">Checking queue...</span>
      <span id="dm-clear-btn" onclick="clearGuaranteed()">CLEAR ✕</span>
    </div>
    <div class="dm-row">
      <select id="dm-select" onchange="onSelectChange()">
        <option value="">— pick existing item —</option>
      </select>
      <button id="dm-add-btn" onclick="setGuaranteed()">SET ITEM ↗</button>
    </div>
    <div class="dm-row">
      <input id="dm-custom-input" type="text" placeholder="Custom item name..." maxlength="60"/>
      <select id="dm-type-select">
        <option value="Consumable">Consumable</option>
        <option value="Basic Gear/Tools">Gear/Tools</option>
        <option value="Trade Goods">Trade Goods</option>
        <option value="Permanent Magic">Permanent Magic</option>
        <option value="Special">Special</option>
      </select>
    </div>
    <div id="dm-status"></div>
  </div>

  <div id="items-area">
    <div id="result-title"></div>
    <div id="gold-row">
      <div style="font-size:18px;width:28px;text-align:center">🪙</div>
      <div style="flex:1">
        <div class="gold-amount" id="gold-amt"></div>
        <div class="gold-per">per adventurer</div>
      </div>
      <span class="gold-label">Gold</span>
    </div>
    <ul id="items-list"></ul>
  </div>
  <button id="done-btn" onclick="resetChest()">OPEN ANOTHER</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzXkW1uExOCy_3HUAE854ubAZ1eBFDSYXUZAWZmk1K8RvoBbDQSJyvY6zVmC4Q86tv3/exec';
function sheetsCall(params){const qs=Object.entries(params).map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');return fetch(`${SCRIPT_URL}?${qs}`).then(r=>r.json()).catch(()=>null);}
function sheetsRead(){return sheetsCall({action:'read'});}
function sheetsSet(name,type,notes){return sheetsCall({action:'set',name,type,notes});}
function sheetsClear(){return sheetsCall({action:'clear'});}
function checkUnlock(){return sheetsCall({action:'checkUnlock'});}
function consumeUnlock(){return sheetsCall({action:'consume'});}

const CHALLENGES=[{name:'Harry Tasker',code:'10024'},{name:'Albert Gibson',code:'34991'}];
let currentChallenge=null,dmUnlocked=false;
function openAuth(){if(dmUnlocked){toggleDmPanel();return;}currentChallenge=CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];document.getElementById('auth-identity').textContent=currentChallenge.name;document.getElementById('auth-input').value='';document.getElementById('auth-error').textContent='';document.getElementById('auth-modal').classList.add('visible');setTimeout(()=>document.getElementById('auth-input').focus(),100);}
function closeAuth(){document.getElementById('auth-modal').classList.remove('visible');}
function submitAuth(){const val=document.getElementById('auth-input').value.trim();if(val===currentChallenge.code){dmUnlocked=true;closeAuth();showDmPanel();document.getElementById('dm-toggle').style.color='#9060ff';document.getElementById('dm-toggle').style.opacity='0.8';}else{document.getElementById('auth-error').textContent='Access denied.';document.getElementById('auth-input').value='';document.getElementById('auth-input').focus();}}
document.getElementById('auth-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAuth();});

function showDmPanel(){populateDmSelect();refreshDmQueue();document.getElementById('dm-panel').classList.add('visible');}
function toggleDmPanel(){document.getElementById('dm-panel').classList.toggle('visible');if(document.getElementById('dm-panel').classList.contains('visible')){populateDmSelect();refreshDmQueue();}}
function closeDmPanel(){document.getElementById('dm-panel').classList.remove('visible');}
function refreshDmQueue(){setStatus('Checking queue...');sheetsRead().then(data=>{if(data&&data.name){document.getElementById('dm-item-name').textContent=data.name;document.getElementById('dm-item-name').style.color='#c090ff';document.getElementById('dm-item-name').style.fontStyle='normal';document.getElementById('dm-clear-btn').style.display='inline-block';setStatus('Item queued — will deliver on next open.');}else{document.getElementById('dm-item-name').textContent='No guaranteed item set';document.getElementById('dm-item-name').style.color='#4a2080';document.getElementById('dm-item-name').style.fontStyle='italic';document.getElementById('dm-clear-btn').style.display='none';setStatus('');}}).catch(()=>setStatus('Could not reach queue.'));}
function populateDmSelect(){const sel=document.getElementById('dm-select');sel.innerHTML='<option value="">— pick existing item —</option>';sel.appendChild(Object.assign(document.createElement('option'),{value:'__custom__',text:'+ Create custom item...'}));LOOT[activeTier].table.forEach((item,i)=>{const opt=document.createElement('option');opt.value=i;opt.text=item.name;sel.appendChild(opt);});}
function onSelectChange(){const val=document.getElementById('dm-select').value;const isCustom=val==='__custom__';document.getElementById('dm-custom-input').style.display=isCustom?'block':'none';document.getElementById('dm-type-select').style.display=isCustom?'block':'none';}
function setGuaranteed(){const val=document.getElementById('dm-select').value;if(!val){setStatus('Please select an item.');return;}let name,type,notes;if(val==='__custom__'){name=document.getElementById('dm-custom-input').value.trim();if(!name){setStatus('Please enter a custom item name.');return;}type=document.getElementById('dm-type-select').value;notes='';}else{const item=LOOT[activeTier].table[+val];name=item.name;type=item.type;notes=item.notes||'';}setStatus('Saving to queue...');sheetsSet(name,type,notes).then(r=>{if(r&&r.ok){refreshDmQueue();setStatus('Item queued — ready for next open.');setTimeout(()=>setStatus(''),2500);}else{setStatus('Failed to save. Check connection.');}}).catch(()=>setStatus('Failed to reach queue.'));}
function clearGuaranteed(){setStatus('Clearing...');sheetsClear().then(()=>{refreshDmQueue();setStatus('Cleared.');setTimeout(()=>setStatus(''),1500);});}
function setStatus(msg){document.getElementById('dm-status').textContent=msg;}
function onTierChange(){if(dmUnlocked&&document.getElementById('dm-panel').classList.contains('visible'))populateDmSelect();}

const SPELLS={Cantrip:['Acid Splash','Blade Ward','Chill Touch','Dancing Lights','Druidcraft','Eldritch Blast','Fire Bolt','Friends','Guidance','Light','Mage Hand','Mending','Message','Minor Illusion','Poison Spray','Prestidigitation','Ray of Frost','Resistance','Sacred Flame','Shillelagh','Shocking Grasp','Spare the Dying','Thaumaturgy','Thorn Whip','True Strike','Vicious Mockery'],1:['Alarm','Animal Friendship','Bane','Bless','Burning Hands','Charm Person','Chromatic Orb','Color Spray','Command','Comprehend Languages','Cure Wounds','Detect Magic','Disguise Self','Divine Favor','Entangle','Faerie Fire','False Life','Feather Fall','Find Familiar','Fog Cloud','Grease','Guiding Bolt','Healing Word','Hellish Rebuke','Heroism','Hex',"Hunter's Mark",'Ice Knife','Identify','Inflict Wounds','Jump','Longstrider','Mage Armor','Magic Missile','Protection from Evil and Good','Ray of Sickness','Sanctuary','Shield','Shield of Faith','Silent Image','Sleep','Speak with Animals','Thunderwave','Unseen Servant','Witch Bolt'],2:['Aid','Alter Self','Arcane Lock','Augury','Barkskin','Blindness/Deafness','Blur','Calm Emotions','Cloud of Daggers','Darkness','Darkvision','Detect Thoughts','Enhance Ability','Enlarge/Reduce','Flame Blade','Flaming Sphere','Gust of Wind','Heat Metal','Hold Person','Invisibility','Knock','Lesser Restoration','Levitate','Locate Object','Magic Weapon',"Melf's Acid Arrow",'Mirror Image','Misty Step','Moonbeam','Pass without Trace','Phantasmal Force','Prayer of Healing','Scorching Ray','See Invisibility','Shatter','Silence','Spider Climb','Spike Growth','Spiritual Weapon','Suggestion','Web'],3:['Animate Dead','Beacon of Hope','Bestow Curse','Blink','Call Lightning','Clairvoyance','Counterspell','Daylight','Dispel Magic','Fear','Fireball','Fly','Gaseous Form','Haste','Hypnotic Pattern','Lightning Bolt','Major Image','Mass Healing Word','Nondetection','Plant Growth','Protection from Energy','Remove Curse','Revivify','Sending','Slow','Speak with Dead','Spirit Guardians','Stinking Cloud','Tongues','Vampiric Touch','Water Breathing'],4:['Arcane Eye','Banishment','Blight','Confusion','Control Water','Death Ward','Dimension Door','Divination','Dominate Beast','Fabricate','Fire Shield','Freedom of Movement','Greater Invisibility','Guardian of Faith','Ice Storm','Locate Creature','Phantasmal Killer','Polymorph','Stone Shape','Stoneskin','Wall of Fire'],5:['Arcane Hand','Awaken','Cloudkill','Commune','Cone of Cold','Conjure Elemental','Contact Other Plane','Contagion','Creation','Dominate Person','Dream','Flame Strike','Geas','Greater Restoration','Hold Monster','Legend Lore','Mass Cure Wounds','Mislead','Modify Memory','Passwall','Planar Binding','Raise Dead','Scrying','Telekinesis','Teleportation Circle','Wall of Force','Wall of Stone'],6:['Blade Barrier','Chain Lightning','Circle of Death','Conjure Fey','Contingency','Create Undead','Disintegrate','Find the Path','Flesh to Stone','Globe of Invulnerability','Harm','Heal',"Heroes' Feast",'Mass Suggestion','Move Earth','Planar Ally','Sunbeam','True Seeing','Wind Walk'],7:['Conjure Celestial','Delayed Blast Fireball','Etherealness','Finger of Death','Fire Storm','Forcecage','Magnificent Mansion','Plane Shift','Prismatic Spray','Project Image','Regenerate','Resurrection','Reverse Gravity','Symbol','Teleport'],8:['Antimagic Field','Control Weather','Demiplane','Dominate Monster','Earthquake','Feeblemind','Incendiary Cloud','Maze','Mind Blank','Power Word Stun','Sunburst'],9:['Astral Projection','Foresight','Gate','Imprisonment','Mass Heal','Meteor Swarm','Power Word Kill','Prismatic Wall','Shapechange','Time Stop','True Resurrection','Wish']};
const SCROLL_MAP={'cantrip':'Cantrip','1st':1,'2nd':2,'3rd':3,'4th':4,'5th':5,'6th':6,'7th':7,'8th':8,'9th':9};
function resolveScroll(n){if(!n.toLowerCase().includes('spell scroll'))return null;const l=n.toLowerCase();for(const[k,v]of Object.entries(SCROLL_MAP))if(l.includes(k)){const p=SPELLS[v];return p?`Scroll of ${p[Math.floor(Math.random()*p.length)]}`:null;}return null;}

const WEAPONS={simple:["Dagger","Handaxe","Light Crossbow","Shortbow","Knuckles","Staff"],martial:["Longsword","Maul","Rapier","Scimitar","Shortsword","Warhammer","Whip","Hand Crossbow","Longbow","Musket"]};
WEAPONS.all=[...WEAPONS.simple,...WEAPONS.martial];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function resolveWeapon(n){const l=n.toLowerCase();if(l.includes("silvered weapon (simple)"))return `Silvered ${pick(WEAPONS.simple)}`;if(l.includes("silvered weapon (martial)"))return `Silvered ${pick(WEAPONS.martial)}`;if(l.includes("+1 weapon"))return `+1 ${pick(WEAPONS.all)}`;if(l.includes("+2 weapon"))return `+2 ${pick(WEAPONS.all)}`;if(l.includes("+3 weapon"))return `+3 ${pick(WEAPONS.all)}`;return null;}

// ── LOOT TABLE CONFIG ─────────────────────────────────────────────────────────
const SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTfNF-hjHlb9p5yowne4UitNcsxAAWiLaXSXBEJD4-ta1hxIEMAtJpHYY7NReg_gm0cM8DFtmfYbEW6/pub?gid=445941768&single=true&output=csv';

const TIER_META={
  bronze:{pulls:2,gold:'2d10'},
  silver:{pulls:3,gold:'4d10'},
  gold:{pulls:4,gold:'8d10'},
  platinum:{pulls:5,gold:'20d10'},
  diamond:{pulls:6,gold:'50d10'},
  onyx:{pulls:7,gold:'250d10'}

function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());return result;
}

function parseLootCSV(csv){
  const lines=csv.split('\n').map(l=>l.trim()).filter(l=>l);
  const tierMap={bronze:'bronze',silver:'silver',gold:'gold',platinum:'platinum',diamond:'diamond',onyx:'onyx'};
  const built={};
  let currentTier=null;
  for(const line of lines){
    const cols=parseCSVLine(line);
    // Detect tier header rows e.g. "Bronze Tier"
    const first=(cols[0]||cols[1]||'').toLowerCase();
    for(const key of Object.keys(tierMap)){
      if(first.includes(key)&&first.includes('tier')){currentTier=key;if(!built[key])built[key]={...TIER_META[key],table:[]};break;}
    }
    if(!currentTier)continue;
    // Data row: col0=d100Min, col1=d100Max, col2=RewardType, col3=Reward, col4=Notes
    const mn=parseInt(cols[0]);const mx=parseInt(cols[1]);
    if(isNaN(mn)||isNaN(mx))continue;
    const type=(cols[2]||'').trim();
    const name=(cols[3]||'').trim();
    const notes=(cols[4]||'').trim();
    if(!name)continue;
    built[currentTier].table.push({min:mn,max:mx,type,name,notes});
  }
  // Only replace tiers that parsed successfully with at least 3 items
  for(const[k,v]of Object.entries(built)){
    if(v.table.length>=3)LOOT[k]=v;
  }
}

function loadLootFromSheet(){
  fetch(SHEET_CSV_URL + '&t=' + Date.now())
    .then(r=>r.text())
    .then(csv=>{parseLootCSV(csv);console.log('Loot tables loaded from Sheet.');})
    .catch(()=>console.log('Sheet unavailable — using fallback loot tables.'));
}

    [[-1.24,-0.86],[-1.24,0.86],[1.24,-0.86],[1.24,0.86]].forEach(([x,z])=>{const sp=new THREE.Mesh(new THREE.ConeGeometry(0.065,0.45,6),mkMat(0x60d8ff,0,1,0x30b0e0,1.5));sp.position.set(x,0.92,z);bodyG.add(sp);});

    const kh=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.11,12),mkMat(t.woodDkC,0.95,0.05));kh.rotation.x=Math.PI/2;kh.position.set(0,0.19,0.968);bodyG.add(kh);
    const khs=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.12,0.11),mkMat(t.woodDkC,0.95,0.05));khs.position.set(0,0.08,0.968);bodyG.add(khs);

  [[-1.1,-0.86],[-1.1,0.86],[1.1,-0.86],[1.1,0.86]].forEach(([x,z])=>{const ft=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.12,0.16),bM);ft.position.set(x,-0.84,z);bodyG.add(ft);});
  mg.add(bodyG);
  const lPivot=new THREE.Group();lPivot.position.set(0,0.0,-0.86);
  const lidLocal=new THREE.Group();lidLocal.position.set(0,0.17,0.86);lPivot.add(lidLocal);

    [-0.72,0.72].forEach(x=>{const fs=new THREE.Mesh(new THREE.ConeGeometry(0.075,0.5,4),mkMat(0x0a0025,0.08,0.9,0x8030c0,0.9));fs.position.set(x,0.17+t.archH+0.25,0);fs.rotation.y=Math.PI/4;lidLocal.add(fs);});
    const rp=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.22,0.025),mkMat(0x8030d0,0.04,0.95,0xb060ff,1.5));rp.position.set(0,0.0,0.93);lidLocal.add(rp);
    [[-1.24,-0.86],[-1.24,0.86],[1.24,-0.86],[1.24,0.86]].forEach(([x,z])=>{const csk=new THREE.Mesh(new THREE.ConeGeometry(0.07,0.45,4),mkMat(0x0c0030,0.08,0.9,0x7020c0,0.7));csk.position.set(x,0.17+t.archH+0.22,z);csk.rotation.y=Math.PI/4;lidLocal.add(csk);});
  }
  if(key==='diamond'){
    [-0.8,0,0.8].forEach(x=>{const gms=new THREE.Mesh(new THREE.OctahedronGeometry(0.085),mkMat(0x60d8ff,0,1,0x30b0e0,2));gms.position.set(x,0.17+t.archH+0.085,0);gms.rotation.y=Math.PI/4;lidLocal.add(gms);});
    [[-1.24,-0.86],[-1.24,0.86],[1.24,-0.86],[1.24,0.86]].forEach(([x,z])=>{const cp=new THREE.Mesh(new THREE.ConeGeometry(0.055,0.38,6),mkMat(0x60d8ff,0,1,0x30b0e0,1.5));cp.position.set(x,0.17+t.archH+0.19,z);lidLocal.add(cp);});
    const latM=mkMat(0x50c0e8,0.04,1,0x30a0d8,0.8);[-0.8,0,0.8].forEach(x=>{const lv=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.5,0.025),latM);lv.position.set(x,0,0.93);lidLocal.add(lv);});
  }
  if(key==='platinum'||key==='silver'){
    const filM=mkMat(t.bandHiC,0.04,1);
    [[0,0.22,'h'],[0,-0.19,'h'],[-1.1,0.015,'v'],[1.1,0.015,'v']].forEach(([x,y,d])=>{const fw=d==='h'?new THREE.BoxGeometry(2.2,0.025,0.025):new THREE.BoxGeometry(0.025,0.44,0.025);const ff=new THREE.Mesh(fw,filM);ff.position.set(x,y,0.93);lidLocal.add(ff);});

function spawnParticles(){const t=TD[activeTier];const colors=t.parts.map(c=>new THREE.Color(c));for(let i=0;i<85;i++){const isGem=activeTier==='diamond'&&Math.random()>0.55;const sz=0.018+Math.random()*0.055;const geo=isGem?new THREE.OctahedronGeometry(sz):new THREE.SphereGeometry(sz,6,6);const m=new THREE.MeshBasicMaterial({color:colors[Math.floor(Math.random()*colors.length)],transparent:true});const p=new THREE.Mesh(geo,m);p.position.set((Math.random()-0.5)*0.5,-0.2,(Math.random()-0.5)*0.35);const ang=Math.random()*Math.PI*2,spd=0.04+Math.random()*0.08;p.userData={vx:Math.cos(ang)*spd,vy:0.06+Math.random()*0.1,vz:Math.sin(ang)*spd*0.5,life:1,decay:0.01+Math.random()*0.013,spin:(Math.random()-0.5)*0.12};scene.add(p);particleMeshes.push(p);}}
function tickParticles(){particleMeshes=particleMeshes.filter(p=>{p.userData.life-=p.userData.decay;if(p.userData.life<=0){p.geometry.dispose();p.material.dispose();scene.remove(p);return false;}p.userData.vy-=0.002;p.position.x+=p.userData.vx;p.position.y+=p.userData.vy;p.position.z+=p.userData.vz;p.rotation.y+=p.userData.spin;p.material.opacity=Math.max(0,p.userData.life);return true;});}

function resetUI(){document.getElementById('result-title').classList.remove('show');document.getElementById('gold-row').classList.remove('show');document.getElementById('items-list').innerHTML='';const db=document.getElementById('done-btn');db.classList.remove('show');db.style.display='none';}

function showResults(guaranteed){
  const t=TD[activeTier];let items=pickItems(activeTier);
  if(guaranteed&&guaranteed.name){const insertAt=Math.floor(Math.random()*(items.length+1));items.splice(insertAt,0,{name:guaranteed.name,type:guaranteed.type||'Special',notes:guaranteed.notes||''});}
  const gold=rollGold(LOOT[activeTier].gold);
  const list=document.getElementById('items-list');list.innerHTML='';
  items.forEach(item=>{const li=document.createElement('li');const notes=item.notes?`<div class="item-notes">${item.notes}</div>`:'';li.innerHTML=`<div class="item-left"><div class="item-name">${tIcon(item.type)} ${item.name}</div>${notes}</div><span class="item-rarity ${rClass(item.type)}">${rLabel(item.type)}</span>`;list.appendChild(li);});
  const rt=document.getElementById('result-title');rt.textContent=`✦ ${t.label} CHEST REWARDS ✦`;rt.style.color=t.labelColor;
  document.getElementById('gold-amt').textContent=`${gold.toLocaleString()} gp`;
  setTimeout(()=>{rt.classList.add('show');document.getElementById('gold-row').classList.add('show');list.querySelectorAll('li').forEach((li,i)=>setTimeout(()=>li.classList.add('show'),(i+1)*150));setTimeout(()=>{const db=document.getElementById('done-btn');db.style.display='block';setTimeout(()=>db.classList.add('show'),50);},items.length*150+400);},600);
}

function startOpen(){
  if(isOpen||opening||uiLocked)return;
  if(!dmUnlocked){
    checkUnlock().then(data=>{
      if(data&&data.unlocked){
        consumeUnlock();
        _doOpen();
      } else {
        setStatus('Chest is locked. Ask your DM to unlock it.');
        setTimeout(()=>setStatus(''),3000);
      }
    });
    return;
  }
  _doOpen();
}
function _doOpen(){
  uiLocked=true;document.getElementById('open-btn').disabled=true;isOpen=true;opening=true;targetLid=MAX_LID; new Audio('lootbox_open.wav').play();
  const openTime=Date.now();
  // Fire Sheets read immediately alongside animation
  const sheetsPromise=Promise.race([
    sheetsRead().catch(()=>null),
    new Promise(resolve=>setTimeout(()=>resolve(null),4000))
  ]);
  // Particles always fire at 420ms
  setTimeout(()=>spawnParticles(),420);
  // Wait for Sheets response, but enforce a minimum 900ms delay (lid animation)
  // and a maximum 4000ms wait before giving up and showing without guaranteed item
  sheetsPromise.then(guaranteed=>{
    const elapsed=Date.now()-openTime;
    const remaining=Math.max(900-elapsed,0);
    setTimeout(()=>{
      showResults(guaranteed);
      if(guaranteed&&guaranteed.name){
        sheetsClear();
        if(dmUnlocked){refreshDmQueue();setStatus('Item delivered and queue cleared.');setTimeout(()=>setStatus(''),3000);}
      }
    },remaining);
  });
}

function resetChest(){uiLocked=false;buildChest(activeTier);}
canvas.addEventListener('click',startOpen);

const bw=document.getElementById('tier-btns');
Object.entries(TD).forEach(([key,t])=>{
  const b=document.createElement('button');b.className='tbtn';b.textContent=t.label;b.dataset.tier=key;
  b.style.color=key==='bronze'?t.btnText:t.btnColor;b.style.borderColor=t.btnBorder;b.style.background=key==='bronze'?t.btnColor:'transparent';
  b.onclick=()=>{if(uiLocked)return;document.querySelectorAll('.tbtn').forEach(btn=>{const tt=TD[btn.dataset.tier];btn.style.background='transparent';btn.style.color=tt.btnColor;});b.style.background=t.btnColor;b.style.color=t.btnText;buildChest(key);};
  bw.appendChild(b);
});

function animate(){
  requestAnimationFrame(animate);idleT+=0.016;
  if(masterGroup){if(!uiLocked)masterGroup.rotation.y=Math.sin(idleT*0.42)*0.16;else masterGroup.rotation.y+=(0-masterGroup.rotation.y)*0.07;}
  if(opening&&lidPivot){lidAngle+=(targetLid-lidAngle)*0.062;lidPivot.rotation.x=lidAngle;if(glowPt)glowPt.intensity=(Math.abs(lidAngle)/Math.abs(MAX_LID))*TD[activeTier].glowMax;if(Math.abs(lidAngle-targetLid)<0.005){lidAngle=targetLid;opening=false;}}
  if((activeTier==='onyx'||activeTier==='diamond')&&masterGroup){const pulse=0.5+Math.sin(idleT*2.8)*0.5;masterGroup.traverse(o=>{if(o.isMesh&&o.material&&o.material.emissiveIntensity>0)o.material.emissiveIntensity=o.material.emissiveIntensity*(0.8+pulse*0.2);});}
  tickParticles();renderer.render(scene,camera);
}

loadLootFromSheet();buildChest('bronze');animate();
