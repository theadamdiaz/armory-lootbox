const band1=`<rect x="${bx-2}" y="${band1y}" width="${bw+4}" height="${bandH}" rx="3" fill="url(#band-${tier}-${part})"/><rect x="${bx-2}" y="${band1y}" width="${bw+4}" height="3" rx="2" fill="${t.metalHi}" fill-opacity="0.4"/><rect x="${bx-2}" y="${band1y+bandH-2}" width="${bw+4}" height="2" fill="${t.bandDark}" fill-opacity="0.5"/>`;
const band2=`<rect x="${bx-2}" y="${band2y}" width="${bw+4}" height="${bandH}" rx="3" fill="url(#band-${tier}-${part})"/><rect x="${bx-2}" y="${band2y}" width="${bw+4}" height="3" rx="2" fill="${t.metalHi}" fill-opacity="0.35"/><rect x="${bx-2}" y="${band2y+bandH-2}" width="${bw+4}" height="2" fill="${t.bandDark}" fill-opacity="0.5"/>`;

const seam=isLid?`<rect x="${bx-2}" y="${by+bh-8}" width="${bw+4}" height="12" fill="url(#seam-${tier})" rx="2"/>`:'';
return `${defs}${ambientEllipse}${mist}${body}${shine}${sL}${sR}${extra}${band1}${band2}${rivets}${lock}${seam}${dustLid}`;}

let currentTier='bronze',opened=false;
function rollD100(){return Math.floor(Math.random()*100)+1;}
function rollGold(f){const m=f.match(/(\d+)d(\d+)/);if(!m)return 0;let t=0;for(let i=0;i<+m[1];i++)t+=Math.floor(Math.random()*+m[2])+1;return t;}
function pickItems(key){const d=LOOT_TABLES[key];return Array.from({length:d.pulls},()=>{const r=rollD100();const entry={...(d.table.find(e=>r>=e.min&&r<=e.max)||d.table[d.table.length-1])};const resolved=resolveScrollName(entry.name);if(resolved){entry.name=resolved;entry.notes='';}return entry;});}
function rarityClass(t){if(t.startsWith('Special'))return 'r-Special';if(t.startsWith('Permanent'))return 'r-Permanent';if(t.startsWith('Trade'))return 'r-Trade';if(t.startsWith('Basic'))return 'r-Basic';return 'r-Consumable';}
function rarityLabel(t){if(t.startsWith('Special'))return 'Special';if(t.startsWith('Permanent'))return 'Permanent Magic';if(t.startsWith('Trade'))return 'Trade Goods';if(t.startsWith('Basic'))return 'Gear/Tools';return 'Consumable';}
function typeIcon(t){if(t.startsWith('Special'))return '✦';if(t.startsWith('Permanent'))return '⚔';if(t.startsWith('Trade'))return '💰';if(t.startsWith('Basic'))return '🎒';return '🧪';}
function redrawChest(tier){document.getElementById('chest-svg-lid').innerHTML=buildChestSVG(tier,'lid');document.getElementById('chest-svg-body').innerHTML=buildChestSVG(tier,'body');document.getElementById('burst').style.background=`radial-gradient(circle, ${TIERS[tier].glow} 0%, transparent 70%)`;}
function buildTierButtons(){const sel=document.getElementById('tier-selector');Object.entries(TIERS).forEach(([key,t])=>{const b=document.createElement('button');b.className='tier-btn';b.textContent=t.label.toUpperCase();b.dataset.tier=key;b.style.color=key===currentTier?t.btnText:t.btnColor;b.style.borderColor=t.btnBorder;b.style.background=key===currentTier?t.btnColor:'transparent';b.onclick=()=>{if(opened)return;selectTier(key);};sel.appendChild(b);});}
function selectTier(key){currentTier=key;document.querySelectorAll('.tier-btn').forEach(b=>{const t=TIERS[b.dataset.tier];b.style.background=b.dataset.tier===key?t.btnColor:'transparent';b.style.color=b.dataset.tier===key?t.btnText:t.btnColor;});redrawChest(key);styleOpenBtn(key);}
function styleOpenBtn(key){const t=TIERS[key];const btn=document.getElementById('open-btn');btn.style.color=t.btnColor;btn.style.borderColor=t.btnBorder;}
function spawnParticles(key){const t=TIERS[key];const wrap=document.getElementById('chest-wrap');for(let i=0;i<30;i++){const p=document.createElement('div');const size=4+Math.random()*9,angle=Math.random()*Math.PI*2,dist=90+Math.random()*110;const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist-50;const color=t.particles[Math.floor(Math.random()*t.particles.length)];p.style.cssText=`position:absolute;border-radius:50%;pointer-events:none;width:${size}px;height:${size}px;background:${color};left:50%;top:45%;--tx:${tx}px;--ty:${ty}px;animation:fly ${0.5+Math.random()*0.7}s ease-out forwards;animation-delay:${Math.random()*0.18}s;`;wrap.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}
function openChest(){if(opened)return;opened=true;const t=TIERS[currentTier];document.getElementById('open-btn').style.display='none';document.getElementById('chest-wrap').style.cursor='default';document.getElementById('chest-wrap').classList.add('chest-open');spawnParticles(currentTier);const items=pickItems(currentTier);const goldAmt=rollGold(LOOT_TABLES[currentTier].gold);const list=document.getElementById('items-list');list.innerHTML='';items.forEach(item=>{const li=document.createElement('li');const notes=item.notes?`<div class="item-notes">${item.notes}</div>`:'';li.innerHTML=`<div class="item-left"><div class="item-name">${typeIcon(item.type)} ${item.name}</div>${notes}</div><div style="display:flex;align-items:center"><span class="item-rarity ${rarityClass(item.type)}">${rarityLabel(item.type)}</span></div>`;list.appendChild(li);});const rt=document.getElementById('result-title');rt.textContent=`✦ ${t.label.toUpperCase()} CHEST REWARDS ✦`;rt.style.color=t.resultColor;document.getElementById('gold-amount-text').textContent=`${goldAmt.toLocaleString()} gp`;setTimeout(()=>{rt.classList.add('show');document.getElementById('gold-row').classList.add('show');list.querySelectorAll('li').forEach((li,i)=>setTimeout(()=>li.classList.add('show'),(i+1)*150));setTimeout(()=>document.getElementById('try-again-btn').classList.add('show'),items.length*150+450);},800);}
function resetChest(){opened=false;document.getElementById('chest-wrap').classList.remove('chest-open');document.getElementById('items-list').innerHTML='';document.getElementById('result-title').classList.remove('show');document.getElementById('gold-row').classList.remove('show');const tryBtn=document.getElementById('try-again-btn');tryBtn.classList.remove('show');setTimeout(()=>tryBtn.style.display='',10);document.getElementById('open-btn').style.display='';document.getElementById('chest-wrap').style.cursor='pointer';redrawChest(currentTier);}
buildTierButtons();redrawChest('bronze');styleOpenBtn('bronze');
</script>
</body>
